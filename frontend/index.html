<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HirePilot AI — Premium Voice Recruiter Platform</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS & Lucide Icons CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            },
            colors: {
              bg: '#03070c',
              glass: 'rgba(10, 22, 38, 0.7)',
              accentCyan: '#06b6d4',
              accentPurple: '#8b5cf6',
              accentEmerald: '#10b981',
              accentRose: '#f43f5e',
              glassBorder: 'rgba(255, 255, 255, 0.08)',
            },
            boxShadow: {
              glow: '0 0 25px rgba(6, 182, 212, 0.35)',
              glowPurple: '0 0 25px rgba(139, 92, 246, 0.35)',
              glowEmerald: '0 0 25px rgba(16, 185, 129, 0.35)',
              glowRose: '0 0 25px rgba(244, 63, 94, 0.35)',
            }
          }
        }
      }
    </script>
    
    <style>
      body {
        background-color: #03070c;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 99px;
      }
      @keyframes spinGlow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spinGlow 4s linear infinite;
      }
      .setup-layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 32px;
      }
      @media (max-width: 880px) {
        .setup-layout {
          grid-template-columns: 1fr;
        }
      }
      .btn-primary {
        background: linear-gradient(135deg, #06b6d4, #8b5cf6);
        border: none;
        border-radius: 14px;
        padding: 14px 24px;
        color: #03070c;
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 20px rgba(6, 182, 212, 0.25);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(6, 182, 212, 0.4);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 12px 24px;
        color: #f1f5f9;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s;
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body class="text-slate-100 font-sans min-h-screen bg-[radial-gradient(circle_at_50%_0%,#111d2e_0%,#03070c_70%,#010204_100%)]">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // STAGE SEQUENCE DEFINITION
      const STAGES = [
        { id: 'introduction', label: 'Introduction' },
        { id: 'resume_validation', label: 'Resume Validation' },
        { id: 'project_deep_dive', label: 'Project Deep Dive' },
        { id: 'technical_skills', label: 'Technical Skills' },
        { id: 'problem_solving', label: 'Problem Solving' },
        { id: 'behavioral', label: 'Behavioral' },
        { id: 'job_fit', label: 'Job Fit' },
        { id: 'closing', label: 'Closing' }
      ];

      function App() {
        const [screen, setScreen] = useState('setup'); // 'setup', 'interview', 'report'
        const [candidateName, setCandidateName] = useState('Ava Lee');
        const [resumeText, setResumeText] = useState('Ava Lee is a backend software engineer with 2 years of experience. Experienced with Python, FastAPI, and Postgres database migrations. Built a small notes indexing app using standard chunking and hashing model retrieval.');
        const [jdText, setJdText] = useState('Backend AI Application Engineer. Requirements: Python, FastAPI router structure, Pydantic schemas, and custom LLM retrieval pipelines. Exposure to system design and container deployments is highly valued.');
        
        // Active Interview States
        const [currentState, setCurrentState] = useState(null);
        const [nextStep, setNextStep] = useState('retriever');
        const [turnsCount, setTurnsCount] = useState(0);
        const [avgScore, setAvgScore] = useState('0.0');
        const [difficulty, setDifficulty] = useState('easy');
        const [activeStage, setActiveStage] = useState('introduction');
        
        // UI Status: 'connecting', 'speaking', 'listening', 'thinking'
        const [status, setStatus] = useState('connecting');
        const [report, setReport] = useState(null);

        // Simulated/non-voice trigger
        const runSimulatedDemo = async () => {
          setScreen('report');
          setReport({
            candidate_name: candidateName,
            role_title: "Compiling Simulated Report...",
            overall_score: 0.0,
            hiring_recommendation: "Hold",
            executive_summary: "Running planning, retrieval, and evaluation nodes. Please hold...",
            strong_areas: [],
            improvement_areas: [],
            dimension_summaries: []
          });

          try {
            const response = await fetch('/api/run-demo', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ candidate_name: candidateName, resume_text: resumeText, jd_text: jdText })
            });
            const data = await response.json();
            setReport(data);
          } catch (e) {
            alert("Simulation run failed.");
            setScreen('setup');
          }
        };

        // Start local microphone voice loop
        const launchVoiceInterview = async () => {
          setScreen('interview');
          setStatus('connecting');

          try {
            const response = await fetch('/api/start-voice-interview', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ candidate_name: candidateName, resume_text: resumeText, jd_text: jdText })
            });

            const result = await response.json();
            setCurrentState(result.state);
            setNextStep(result.next_step);
            setTurnsCount(1);
            setActiveStage(result.state.interview_stage || 'introduction');
            
            // Execute voice turn loop
            runVoiceInterviewLoop(result.state, result.next_step, 1);

          } catch (e) {
            console.error(e);
            alert("Local mic/audio connection failed. Ensure server has mic permissions.");
            setScreen('setup');
          }
        };

        // Loop voice interview turns
        const runVoiceInterviewLoop = async (stateVal, nextStepVal, currentTurns) => {
          if (nextStepVal === 'report') {
            setStatus('thinking');
            try {
              const response = await fetch('/api/next-voice-turn', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(stateVal)
              });
              const result = await response.json();
              setReport(result.report);
              setScreen('report');
            } catch (e) {
              alert("Failed to build final report.");
              setScreen('setup');
            }
            return;
          }

          setStatus('speaking');

          try {
            const response = await fetch('/api/next-voice-turn', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(stateVal)
            });

            const result = await response.json();
            const updatedState = result.state;
            
            setCurrentState(updatedState);
            setNextStep(result.next_step);
            const nextTurns = currentTurns + 1;
            setTurnsCount(nextTurns);
            
            if (updatedState.current_scores && updatedState.current_scores.length > 0) {
              const sum = updatedState.current_scores.reduce((a, b) => a + b.overall_score, 0);
              setAvgScore((sum / updatedState.current_scores.length).toFixed(1));
            }
            if (updatedState.current_difficulty) {
              setDifficulty(updatedState.current_difficulty);
            }
            setActiveStage(updatedState.interview_stage || 'introduction');

            // Trigger next loop iteration
            runVoiceInterviewLoop(updatedState, result.next_step, nextTurns);

          } catch (error) {
            console.error("Voice turn error:", error);
            alert("Hardware voice loop timeout. Restarting turn loop...");
            setTimeout(() => runVoiceInterviewLoop(stateVal, nextStepVal, currentTurns), 2000);
          }
        };

        const resetAll = () => {
          setScreen('setup');
          setCurrentState(null);
          setTurnsCount(0);
          setAvgScore('0.0');
          setDifficulty('easy');
          setActiveStage('introduction');
          setReport(null);
        };

        return (
          <div className="flex flex-col min-h-screen">
            {/* SETUP SCREEN */}
            {screen === 'setup' && (
              <main className="flex-1 max-w-5xl mx-auto w-full px-4 py-12 flex flex-col justify-center">
                <div className="glass-card bg-glass border border-glassBorder rounded-[28px] p-8 md:p-12 shadow-shadow setup-layout">
                  <div>
                    <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-xs font-bold text-accentCyan uppercase tracking-widest mb-6">
                      <span className="w-2 h-2 rounded-full bg-accentCyan animate-pulse"></span>
                      Voice Agent Setup
                    </div>
                    <h1 className="font-outfit text-4xl md:text-5xl font-extrabold tracking-tight leading-tight mb-6">
                      Voice-First Adaptive <br /><span className="bg-gradient-to-r from-accentCyan to-accentPurple bg-clip-text text-fill-color-transparent text-transparent">AI Recruiting Agent</span>
                    </h1>
                    <p className="text-slate-400 text-lg leading-relaxed mb-8">
                      Experience automated, fully conversational candidate screening driven by LangGraph and the Groq Llama-3 API. Speak naturally—the AI tracks context, adjusts levels, and designs reports.
                    </p>

                    <div className="flex flex-col gap-5 mb-8">
                      <div className="flex gap-4 items-start">
                        <div className="w-6 h-6 rounded-full bg-purple-500/10 border border-purple-500/20 text-accentPurple flex items-center justify-center font-bold text-xs flex-shrink-0">1</div>
                        <p className="text-sm text-slate-300"><strong>Hands-free VAD:</strong> Zero clicks needed. The system automatically detects when you speak and finish.</p>
                      </div>
                      <div className="flex gap-4 items-start">
                        <div className="w-6 h-6 rounded-full bg-purple-500/10 border border-purple-500/20 text-accentPurple flex items-center justify-center font-bold text-xs flex-shrink-0">2</div>
                        <p className="text-sm text-slate-300"><strong>Speech STT & TTS:</strong> Outputs spoken audio via Edge TTS and transcribes microphone input via Whisper.</p>
                      </div>
                      <div className="flex gap-4 items-start">
                        <div className="w-6 h-6 rounded-full bg-purple-500/10 border border-purple-500/20 text-accentPurple flex items-center justify-center font-bold text-xs flex-shrink-0">3</div>
                        <p className="text-sm text-slate-300"><strong>Dynamic Depth Reasoning:</strong> Adjusts question levels dynamically from easy up to architecture depending on score.</p>
                      </div>
                    </div>

                    <div className="flex gap-4 flex-wrap">
                      <button className="btn-primary" onClick={launchVoiceInterview}>
                        <svg viewBox="0 0 24 24" width="20" height="20" className="fill-current">
                          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                        Start Voice Interview
                      </button>
                      <button className="btn-secondary text-slate-200" onClick={runSimulatedDemo}>
                        Simulate Demo Report
                      </button>
                    </div>
                  </div>

                  <div className="flex flex-col gap-6">
                    <div className="flex flex-col gap-2">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Candidate Name</label>
                      <input 
                        type="text" 
                        value={candidateName} 
                        onChange={(e) => setCandidateName(e.target.value)} 
                        className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-accentCyan focus:bg-white/10 transition"
                      />
                    </div>

                    <div className="flex flex-col gap-2">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Resume Details / Text</label>
                      <textarea 
                        value={resumeText} 
                        onChange={(e) => setResumeText(e.target.value)} 
                        className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-accentCyan focus:bg-white/10 h-32 transition resize-none custom-scrollbar"
                      />
                    </div>

                    <div className="flex flex-col gap-2">
                      <label className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Job Description Text</label>
                      <textarea 
                        value={jdText} 
                        onChange={(e) => setJdText(e.target.value)} 
                        className="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-accentCyan focus:bg-white/10 h-32 transition resize-none custom-scrollbar"
                      />
                    </div>
                  </div>
                </div>
              </main>
            )}

            {/* VOICE INTERVIEW SCREEN */}
            {screen === 'interview' && (
              <main className="flex-1 max-w-5xl mx-auto w-full px-4 py-8 grid grid-columns-1 md:grid-cols-[280px_1fr] gap-6">
                {/* Sidebar Status Trackers */}
                <div className="flex flex-col gap-6">
                  <div className="glass-card bg-glass border border-glassBorder rounded-2xl p-6 shadow-shadow flex flex-col gap-5">
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-white/5 border border-white/5 rounded-xl p-3 text-center">
                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Turns</div>
                        <div className="font-outfit text-xl font-bold text-accentCyan">{turnsCount}</div>
                      </div>
                      <div className="bg-white/5 border border-white/5 rounded-xl p-3 text-center">
                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Avg Score</div>
                        <div className="font-outfit text-xl font-bold text-accentCyan">{avgScore}</div>
                      </div>
                    </div>
                    
                    <div className="bg-white/5 border border-white/5 rounded-xl p-3.5 text-center">
                      <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Difficulty Level</div>
                      <div className="font-outfit text-lg font-bold text-accentPurple capitalize">{difficulty}</div>
                    </div>

                    <div className="border-t border-glassBorder pt-4">
                      <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Interview Stages</div>
                      <div className="flex flex-col gap-2">
                        {STAGES.map((s) => {
                          const isActive = activeStage === s.id;
                          const activeIndex = STAGES.findIndex(item => item.id === activeStage);
                          const selfIndex = STAGES.findIndex(item => item.id === s.id);
                          const isCompleted = selfIndex < activeIndex;

                          return (
                            <div 
                              key={s.id} 
                              className={`flex items-center gap-3 px-3 py-2 rounded-xl text-xs font-semibold border transition ${
                                isActive 
                                  ? 'bg-cyan-500/10 border-cyan-500/25 text-slate-100' 
                                  : isCompleted 
                                    ? 'border-transparent text-accentEmerald' 
                                    : 'border-transparent text-slate-500'
                              }`}
                            >
                              <span className={`w-2 h-2 rounded-full flex-shrink-0 ${
                                isActive 
                                  ? 'bg-accentCyan shadow-[0_0_8px_#06b6d4]' 
                                  : isCompleted 
                                    ? 'bg-accentEmerald' 
                                    : 'bg-slate-700'
                              }`}></span>
                              {s.label}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Voice Arena Screen */}
                <div className="glass-card bg-glass border border-glassBorder rounded-2xl p-8 shadow-shadow flex flex-col items-center justify-center gap-10 min-h-[550px] relative">
                  
                  <div className="relative flex items-center justify-center">
                    {/* Glowing Core Visualizer */}
                    <div className={`w-44 h-44 rounded-full bg-gradient-to-b from-purple-500/20 to-glass border-3 border-accentCyan flex items-center justify-center transition-all duration-700 z-10 ${
                      status === 'speaking' 
                        ? 'border-accentPurple shadow-glowPurple scale-105' 
                        : status === 'listening' 
                          ? 'border-accentEmerald shadow-glowEmerald' 
                          : status === 'thinking' 
                            ? 'border-accentRose shadow-glowRose animate-spin-slow' 
                            : 'shadow-glow'
                    }`}>
                      <svg viewBox="0 0 24 24" width="48" height="48" className="fill-current text-slate-200 opacity-90">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
                      </svg>
                    </div>
                    
                    {/* Status Badge */}
                    <div className={`absolute -bottom-4 px-4 py-1.5 rounded-full bg-bg border border-glassBorder text-xs font-bold uppercase tracking-wider z-20 shadow-shadow ${
                      status === 'speaking' 
                        ? 'text-accentPurple border-purple-500/30' 
                        : status === 'listening' 
                          ? 'text-accentEmerald border-emerald-500/30' 
                          : status === 'thinking' 
                            ? 'text-accentRose border-rose-500/30' 
                            : 'text-accentCyan border-cyan-500/30'
                    }`}>
                      {status === 'connecting' ? 'Connecting' : status}
                    </div>
                  </div>

                  {/* Status Helper Text */}
                  <div className="text-center max-w-[80%]">
                    <p className="font-outfit text-lg font-medium text-slate-300 mb-2 leading-relaxed">
                      {status === 'connecting' && 'Starting server voice session with Alex...'}
                      {status === 'speaking' && 'Listen to the interviewer\'s question...'}
                      {status === 'listening' && 'Speak into your microphone. Alex is listening...'}
                      {status === 'thinking' && 'Analyzing response quality and generating next steps...'}
                    </p>
                    <span className="text-xs text-slate-500 uppercase tracking-widest font-mono">
                      {status === 'listening' ? 'Voice VAD active — pause to submit' : 'Mic on always'}
                    </span>
                  </div>

                  {/* Dynamic wave animation */}
                  <div className="flex items-center gap-1.5 h-10">
                    <div className={`w-1 bg-accentCyan rounded-full transition-all duration-300 ${status === 'speaking' ? 'h-8 animate-pulse bg-accentPurple' : 'h-1.5'}`}></div>
                    <div className={`w-1 bg-accentCyan rounded-full transition-all duration-300 delay-75 ${status === 'speaking' ? 'h-6 animate-pulse bg-accentPurple' : 'h-1.5'}`}></div>
                    <div className={`w-1 bg-accentCyan rounded-full transition-all duration-300 delay-150 ${status === 'speaking' ? 'h-9 animate-pulse bg-accentPurple' : 'h-1.5'}`}></div>
                    <div className={`w-1 bg-accentCyan rounded-full transition-all duration-300 delay-100 ${status === 'speaking' ? 'h-7 animate-pulse bg-accentPurple' : 'h-1.5'}`}></div>
                    <div className={`w-1 bg-accentCyan rounded-full transition-all duration-300 delay-200 ${status === 'speaking' ? 'h-5 animate-pulse bg-accentPurple' : 'h-1.5'}`}></div>
                  </div>
                </div>
              </main>
            )}

            {/* COMPLETED REPORT SCREEN */}
            {screen === 'report' && report && (
              <main className="flex-1 max-w-4xl mx-auto w-full px-4 py-12 flex flex-col justify-center">
                <div className="glass-card bg-glass border border-glassBorder rounded-[28px] p-8 md:p-10 shadow-shadow">
                  {/* Report Header */}
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-b border-glassBorder pb-8 mb-8">
                    <div>
                      <h2 className="font-outfit text-3xl font-bold tracking-tight text-slate-100 mb-2">{report.candidate_name}</h2>
                      <p className="text-sm font-semibold text-slate-400 tracking-wide uppercase">{report.role_title || 'Backend AI Engineer'}</p>
                    </div>

                    <div className="flex items-center gap-5">
                      <div className="flex flex-col items-center justify-center bg-purple-500/5 border border-purple-500/20 rounded-full w-24 h-24 text-center">
                        <strong className="font-outfit text-2xl font-black bg-gradient-to-r from-accentCyan to-accentPurple bg-clip-text text-fill-color-transparent text-transparent">
                          {(report.overall_score || 0.0).toFixed(1)}
                        </strong>
                        <span className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Overall</span>
                      </div>
                      
                      <div className={`px-4 py-2 rounded-xl text-sm font-bold uppercase tracking-wider border ${
                        report.hiring_recommendation === 'Strong Hire' 
                          ? 'bg-emerald-500/10 border-emerald-500/30 text-accentEmerald' 
                          : report.hiring_recommendation === 'Hire' 
                            ? 'bg-cyan-500/10 border-cyan-500/30 text-accentCyan' 
                            : report.hiring_recommendation === 'Hold' 
                              ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' 
                              : 'bg-rose-500/10 border-rose-500/30 text-accentRose'
                      }`}>
                        {report.hiring_recommendation}
                      </div>
                    </div>
                  </div>

                  {/* Executive Summary */}
                  <div className="mb-8">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 pb-2 border-b border-white/5">Executive Summary</h3>
                    <p className="text-slate-300 leading-relaxed text-[0.98rem]">{report.executive_summary}</p>
                  </div>

                  {/* Strengths & Weaknesses Grid */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div className="bg-white/[0.015] border border-white/[0.04] rounded-2xl p-6">
                      <h4 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 border-b border-white/5 pb-2">Strong Signals</h4>
                      <div className="flex flex-wrap gap-2">
                        {report.strong_areas.map((s, idx) => (
                          <span key={idx} className="bg-emerald-500/5 border border-emerald-500/15 rounded-lg px-3 py-1.5 text-xs text-emerald-300 font-medium">
                            {s}
                          </span>
                        ))}
                      </div>
                    </div>

                    <div className="bg-white/[0.015] border border-white/[0.04] rounded-2xl p-6">
                      <h4 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 border-b border-white/5 pb-2">Growth & Focus Areas</h4>
                      <div className="flex flex-wrap gap-2">
                        {report.improvement_areas.map((w, idx) => (
                          <span key={idx} className="bg-rose-500/5 border border-rose-500/15 rounded-lg px-3 py-1.5 text-xs text-rose-300 font-medium">
                            {w}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Evaluation Dimensions */}
                  <div className="mb-8">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 pb-2 border-b border-white/5">Dimension Evaluations</h3>
                    <div className="flex flex-col gap-3">
                      {report.dimension_summaries.map((d, idx) => (
                        <div key={idx} className="bg-white/[0.01] border border-white/[0.03] rounded-xl p-4">
                          <div className="flex justify-between items-center mb-1">
                            <strong className="text-sm font-semibold capitalize text-slate-200">{d.dimension.replace(/_/g, ' ')}</strong>
                            <span className="text-xs font-bold text-accentCyan">{(d.average_score || 0.0).toFixed(1)} / 5.0</span>
                          </div>
                          <p className="text-xs text-slate-400 leading-relaxed">{d.comment}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Action buttons */}
                  <div className="flex gap-4">
                    <button className="btn-primary" onClick={resetAll}>
                      Reset Platform
                    </button>
                  </div>
                </div>
              </main>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
